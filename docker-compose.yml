services:
  apex-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apex_v2
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex"]
      interval: 5s
      timeout: 3s
      retries: 5

  apex-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  apex-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://apex:apex_dev_2026@apex-db:5432/apex_v2
      REDIS_URL: redis://apex-redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
    depends_on:
      apex-db:
        condition: service_healthy
      apex-redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app

  apex-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://apex:apex_dev_2026@apex-db:5432/apex_v2
      REDIS_URL: redis://apex-redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      CELERY_BROKER_URL: redis://apex-redis:6379/1
      CELERY_RESULT_BACKEND: redis://apex-redis:6379/2
    depends_on:
      apex-db:
        condition: service_healthy
      apex-redis:
        condition: service_healthy
    command: celery -A app.worker worker --loglevel=info

  apex-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://apex:apex_dev_2026@apex-db:5432/apex_v2
      REDIS_URL: redis://apex-redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      CELERY_BROKER_URL: redis://apex-redis:6379/1
      CELERY_RESULT_BACKEND: redis://apex-redis:6379/2
    depends_on:
      apex-db:
        condition: service_healthy
      apex-redis:
        condition: service_healthy
    command: celery -A app.worker beat --loglevel=info

volumes:
  pgdata:
