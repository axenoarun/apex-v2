services:
  apex-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apex_v2}
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex} -d ${POSTGRES_DB:-apex_v2}"]
      interval: 5s
      timeout: 3s
      retries: 5
    shm_size: 256mb

  apex-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  apex-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-apex}:${POSTGRES_PASSWORD}@apex-db:5432/${POSTGRES_DB:-apex_v2}
      REDIS_URL: redis://apex-redis:6379/0
      CELERY_BROKER_URL: redis://apex-redis:6379/1
      CELERY_RESULT_BACKEND: redis://apex-redis:6379/2
    depends_on:
      apex-db:
        condition: service_healthy
      apex-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  apex-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-apex}:${POSTGRES_PASSWORD}@apex-db:5432/${POSTGRES_DB:-apex_v2}
      REDIS_URL: redis://apex-redis:6379/0
      CELERY_BROKER_URL: redis://apex-redis:6379/1
      CELERY_RESULT_BACKEND: redis://apex-redis:6379/2
    depends_on:
      apex-db:
        condition: service_healthy
      apex-redis:
        condition: service_healthy
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  apex-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-apex}:${POSTGRES_PASSWORD}@apex-db:5432/${POSTGRES_DB:-apex_v2}
      REDIS_URL: redis://apex-redis:6379/0
      CELERY_BROKER_URL: redis://apex-redis:6379/1
      CELERY_RESULT_BACKEND: redis://apex-redis:6379/2
    depends_on:
      apex-db:
        condition: service_healthy
      apex-redis:
        condition: service_healthy
    command: celery -A app.worker beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule"]
      interval: 30s
      timeout: 5s
      retries: 3

  apex-nginx:
    build:
      context: .
      dockerfile: deploy/Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      apex-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
